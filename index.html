<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Diagnostic - CEFC</title>
<style>:root{--bg:#0f0f11;--surface:#1a1a1f;--s2:#25252c;--border:#2e2e3a;--accent:#e8c84a;--ok:#3ecf8e;--ok-bg:#0d3326;--ok-b:#1a6648;--err:#e05252;--err-bg:#2d1010;--err-b:#7a2020;--info:#4a90d9;--text:#f0f0f0;--muted:#8888a0;--r:14px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:60px;}
header{width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
header img{width:40px;height:40px;border-radius:8px;object-fit:contain;background:#fff;padding:2px;}
.ht h1{font-size:15px;font-weight:600;}.ht p{font-size:12px;color:var(--muted);}
.wbar{width:100%;max-width:600px;padding:18px 20px 0;display:flex;gap:10px;}
.wbtn{flex:1;padding:10px 6px;border-radius:var(--rs);border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;text-align:center;transition:all .18s;}
.wbtn:hover{border-color:var(--accent);color:var(--text);}.wbtn.active{border-color:var(--accent);background:rgba(232,200,74,.12);color:var(--accent);}.wbtn.soon{opacity:.35;cursor:not-allowed;}
.wi{font-size:20px;display:block;margin-bottom:3px;}
.main{width:100%;max-width:600px;padding:18px 20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 20px 18px;animation:fu .25s ease;}
@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.stag{display:inline-block;background:rgba(74,144,217,.15);color:#6ab0f0;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:5px;margin-bottom:12px;}
.q{font-size:17px;font-weight:600;line-height:1.45;margin-bottom:10px;}
.instr{font-size:13px;color:var(--muted);line-height:1.65;padding:11px 14px;background:var(--s2);border-left:3px solid var(--info);border-radius:0 var(--rs) var(--rs) 0;margin-bottom:14px;}
.photo{width:100%;border-radius:var(--rs);margin-bottom:14px;border:1px solid var(--border);display:block;max-height:320px;object-fit:contain;}
.prog{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.pb{flex:1;height:3px;background:var(--border);border-radius:2px;}.pf{height:100%;background:var(--accent);border-radius:2px;transition:width .35s;}.pl{font-size:11px;color:var(--muted);white-space:nowrap;}
.btns{display:flex;flex-direction:column;gap:10px;}
.btn{width:100%;padding:13px 16px;border-radius:var(--rs);border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:15px;cursor:pointer;text-align:left;transition:all .15s;line-height:1.4;}
.btn:hover{border-color:var(--accent);background:rgba(232,200,74,.07);transform:translateX(2px);}
.btn.oui{border-left:3px solid var(--ok);}.btn.non{border-left:3px solid var(--err);}.btn.sym{border-left:3px solid var(--info);}
.btn.oui:hover{border-color:var(--ok);background:rgba(62,207,142,.07);}.btn.non:hover{border-color:var(--err);background:rgba(224,82,82,.07);}
.btn.back{background:transparent;border-color:var(--border);color:var(--muted);font-size:13px;padding:9px 14px;margin-top:4px;}
.btn.restart{font-size:14px;padding:11px 16px;margin-top:10px;}
.rok{background:var(--ok-bg);border:1px solid var(--ok-b);border-radius:var(--rs);padding:18px;margin-bottom:14px;}
.rerr{background:var(--err-bg);border:1px solid var(--err-b);border-radius:var(--rs);padding:18px;margin-bottom:14px;}
.rt{font-size:16px;font-weight:600;margin-bottom:8px;}
.rok .rt{color:var(--ok);}.rerr .rt{color:var(--err);}
.rb{font-size:14px;line-height:1.6;}
.rok .rb{color:#7de8bb;}.rerr .rb{color:#e89090;}</style>
</head>

00c9tape 4 \u2014 Fil de corps", "q": "En pontant A et B (fiche 3 broches, c\u00f4t\u00e9 arme) avec un objet m\u00e9tallique, une lumi\u00e8re s'allume-t-elle ?", "i": "D\u00e9branchez l\u00e9g\u00e8rement la fiche 3 broches c\u00f4t\u00e9 arme du bo\u00eetier. Pontez A et B avec une pi\u00e8ce ou un tournevis.", "photo": "enrouleur", "oui": {"ok": 0, "t": "Fil de corps d\u00e9fectueux", "b": "Remplacez le fil de corps."}, "non": "ep_nt5"}, "ep_nt5": {"tag": "\u00c9tape 5 \u2014 Enrouleur", "q": "En pontant A et B sur l'enrouleur (fiche 3 broches, c\u00f4t\u00e9 enrouleur), une lumi\u00e8re s'allume-t-elle ?", "i": "M\u00eame test sur la fiche 3 broches c\u00f4t\u00e9 enrouleur, broches A et B.", "photo": "enrouleur", "oui": {"ok": 0, "t": "Enrouleur d\u00e9fectueux", "b": "Remplacez ou faites v\u00e9rifier l'enrouleur."}, "non": "ep_nt6"}, "ep_nt6": {"tag": "\u00c9tape 6 \u2014 C\u00e2ble de piste", "q": "En pontant A et B sur le c\u00e2ble de piste, une lumi\u00e8re s'allume-t-elle ?", "i": "Pontez A et B aux extr\u00e9mit\u00e9s du c\u00e2ble de piste.", "oui": {"ok": 0, "t": "C\u00e2ble de piste d\u00e9fectueux", "b": "Remplacez le c\u00e2ble de piste."}, "non": {"ok": 0, "t": "Bo\u00eetier de score d\u00e9fectueux", "b": "Toutes les pi\u00e8ces sont OK. Le bo\u00eetier est d\u00e9fectueux. Contactez un technicien."}}, "ep_gd": {"tag": "\u00c9tape 1 \u2014 Garde", "q": "La garde est-elle propre et non oxyd\u00e9e ?", "i": "Nettoyez la garde \u00e0 la laine d'acier ou au papier de verre fin. Une garde sale ou oxyd\u00e9e conduit le courant et provoque des touches fant\u00f4mes.", "oui": "ep_gd2", "non": {"ok": 1, "t": "Garde \u00e0 nettoyer", "b": "Nettoyez la garde et retestez. Une garde propre ne doit pas enregistrer de touche."}}, "ep_gd2": {"tag": "\u00c9tape 2 \u2014 Test fiche C (i)", "q": "En appuyant la pointe adverse sur la fiche C du fil de corps c\u00f4t\u00e9 arme (i), une lumi\u00e8re s'allume-t-elle ?", "i": "Appuyez la pointe de l'adversaire directement sur la fiche C de la fiche 3 broches c\u00f4t\u00e9 arme. Pas de lumi\u00e8re = arme d\u00e9fectueuse.", "photo": "enrouleur", "oui": "ep_gd3", "non": {"ok": 0, "t": "Arme d\u00e9fectueuse", "b": "Le circuit C de l'arme est d\u00e9fectueux. Remplacez l'arme."}}, "ep_gd3": {"tag": "\u00c9tape 3 \u2014 Test fiche C fil de corps (ii)", "q": "En appuyant la pointe sur la fiche C c\u00f4t\u00e9 enrouleur du fil de corps (ii), une lumi\u00e8re s'allume-t-elle ?", "i": "Testez la fiche C \u00e0 l'extr\u00e9mit\u00e9 enrouleur du fil de corps.", "photo": "enrouleur", "oui": "ep_gd4", "non": {"ok": 0, "t": "Fil de corps d\u00e9fectueux", "b": "Remplacez le fil de corps."}}, "ep_gd4": {"tag": "\u00c9tape 4 \u2014 Test fiche C enrouleur (iii)", "q": "En appuyant la pointe sur la fiche C c\u00f4t\u00e9 c\u00e2ble de piste de l'enrouleur (iii), une lumi\u00e8re s'allume-t-elle ?", "i": "Testez la fiche C \u00e0 l'entr\u00e9e de l'enrouleur, c\u00f4t\u00e9 c\u00e2ble de piste.", "oui": "ep_gd5", "non": {"ok": 0, "t": "Enrouleur d\u00e9fectueux", "b": "Remplacez ou faites v\u00e9rifier l'enrouleur."}}, "ep_gd5": {"tag": "\u00c9tape 5 \u2014 Test fiche C c\u00e2ble de piste (iv)", "q": "En appuyant la pointe sur la fiche C c\u00f4t\u00e9 bo\u00eetier du c\u00e2ble de piste (iv), une lumi\u00e8re s'allume-t-elle ?", "i": "Testez la fiche C \u00e0 l'extr\u00e9mit\u00e9 bo\u00eetier du c\u00e2ble de piste.", "oui": {"ok": 0, "t": "C\u00e2ble de piste d\u00e9fectueux", "b": "Remplacez le c\u00e2ble de piste."}, "non": {"ok": 0, "t": "Bo\u00eetier de score d\u00e9fectueux", "b": "Toutes les pi\u00e8ces sont OK. Le bo\u00eetier est d\u00e9fectueux. Contactez un technicien."}}}};

var H=[], C="start", W="sabre";

function go(n){ H.push(C); C=n; render(); }
function ans(c){ var n=ALL[W][C]; H.push(C); C=n[c]; render(); }
function back(){ if(H.length){ C=H.pop(); render(); } }
function restart(){ H=[]; C="start"; render(); }
function selectWeapon(w, el){
  document.querySelectorAll(".wbtn").forEach(function(b){ b.classList.remove("active"); });
  el.classList.add("active");
  W=w; H=[]; C="start"; render();
}

function render(){
  var node = (typeof C === "object") ? C : ALL[W][C];
  var el = document.getElementById("content");
  var step = H.length, total = 7, pct = Math.round(step/total*100);

  if(node.ok !== undefined){
    var cls = node.ok ? "rok" : "rerr";
    el.innerHTML = '<div class="'+cls+'"><div class="rt">'+node.t+'</div><div class="rb">'+node.b+'</div></div>'
      + '<button class="btn restart" onclick="restart()">&#8592; Nouveau diagnostic</button>';
    return;
  }

  var prog = step > 0
    ? '<div class="prog"><div class="pb"><div class="pf" style="width:'+pct+'%"></div></div><div class="pl">&#201;tape '+step+' / '+total+'</div></div>'
    : "";
  var photo = node.photo ? '<img class="photo" src="'+P[node.photo]+'" alt="schema">' : "";
  var instr = node.i ? '<div class="instr">'+node.i+'</div>' : "";
  var back_html = H.length > 0 ? '<button class="btn back" onclick="back()">&#8592; &#201;tape pr&#233;c&#233;dente</button>' : "";

  if(node.type === "sym"){
    el.innerHTML = '<div class="stag">'+node.tag+'</div><div class="q">'+node.q+'</div>'+instr+photo+'<div class="btns" id="sym-btns"></div>';
    var container = document.getElementById("sym-btns");
    node.opts.forEach(function(o){
      var b = document.createElement("button");
      b.className = "btn sym";
      b.textContent = o.l;
      b.setAttribute("data-n", o.n);
      b.addEventListener("click", function(){ go(this.getAttribute("data-n")); });
      container.appendChild(b);
    });
  } else {
    el.innerHTML = prog
      + '<div class="stag">'+node.tag+'</div>'
      + '<div class="q">'+node.q+'</div>'
      + instr + photo
      + '<div class="btns">'
      + '<button class="btn oui" onclick="ans(\'oui\')">&#10003; Oui</button>'
      + '<button class="btn non" onclick="ans(\'non\')">&#10007; Non</button>'
      + '</div>' + back_html;
  }
}
render();
</script>
