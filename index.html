<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostic Matériel — CEFC</title>
<meta name="description" content="Outil de diagnostic interactif pour le matériel d'escrime électrique.">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #25252c;
    --border: #2e2e3a;
    --accent: #e8c84a;
    --ok: #3ecf8e;
    --ok-bg: #0d3326;
    --ok-border: #1a6648;
    --danger: #e05252;
    --danger-bg: #2d1010;
    --danger-border: #7a2020;
    --info: #4a90d9;
    --text: #f0f0f0;
    --muted: #8888a0;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 60px;
  }

  /* HEADER */
  header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header img { width: 40px; height: 40px; border-radius: 8px; object-fit: contain; background: #fff; padding: 2px; }
  .header-text h1 { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .header-text p { font-size: 12px; color: var(--muted); }

  /* WEAPON TABS */
  .weapon-bar {
    width: 100%;
    max-width: 600px;
    padding: 20px 20px 0;
    display: flex;
    gap: 10px;
  }
  .weapon-btn {
    flex: 1;
    padding: 10px 6px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
  }
  .weapon-btn:hover { border-color: var(--accent); color: var(--text); }
  .weapon-btn.active { border-color: var(--accent); background: rgba(232,200,74,0.12); color: var(--accent); }
  .weapon-btn.disabled { opacity: 0.35; cursor: not-allowed; }
  .weapon-icon { font-size: 20px; display: block; margin-bottom: 3px; }

  /* MAIN CARD */
  .main { width: 100%; max-width: 600px; padding: 20px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 22px 20px;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* STEP TAG */
  .step-tag {
    display: inline-block;
    background: rgba(74,144,217,0.15);
    color: #6ab0f0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 5px;
    margin-bottom: 12px;
  }

  /* QUESTION */
  .question {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.45;
    color: var(--text);
    margin-bottom: 10px;
  }

  /* INSTRUCTION BOX */
  .instruction {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    padding: 11px 14px;
    background: var(--surface2);
    border-left: 3px solid var(--info);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin-bottom: 16px;
  }

  /* SCHEMA */
  .schema-wrap {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 16px;
    text-align: center;
    overflow-x: auto;
  }
  .schema-wrap svg { max-width: 100%; height: auto; }

  /* PROGRESS */
  .progress {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.35s ease; }
  .progress-label { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* BUTTONS */
  .btns { display: flex; flex-direction: column; gap: 10px; }
  .btn {
    width: 100%;
    padding: 13px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 15px;
    font-weight: 400;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .btn:hover { border-color: var(--accent); background: rgba(232,200,74,0.07); transform: translateX(2px); }
  .btn.oui  { border-left: 3px solid var(--ok); }
  .btn.non  { border-left: 3px solid var(--danger); }
  .btn.symptom { border-left: 3px solid var(--info); }
  .btn.oui:hover  { border-color: var(--ok); background: rgba(62,207,142,0.07); }
  .btn.non:hover  { border-color: var(--danger); background: rgba(224,82,82,0.07); }
  .btn.back {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
    font-size: 13px;
    padding: 9px 14px;
    margin-top: 4px;
  }
  .btn.restart {
    font-size: 14px;
    padding: 11px 16px;
    border-color: var(--border);
    background: var(--surface2);
    margin-top: 10px;
  }

  /* RESULTS */
  .result-ok {
    background: var(--ok-bg);
    border: 1px solid var(--ok-border);
    border-radius: var(--radius-sm);
    padding: 18px;
    margin-bottom: 14px;
  }
  .result-fault {
    background: var(--danger-bg);
    border: 1px solid var(--danger-border);
    border-radius: var(--radius-sm);
    padding: 18px;
    margin-bottom: 14px;
  }
  .result-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .result-ok    .result-title { color: var(--ok); }
  .result-fault .result-title { color: var(--danger); }
  .result-body { font-size: 14px; line-height: 1.6; }
  .result-ok    .result-body { color: #7de8bb; }
  .result-fault .result-body { color: #e89090; }

  /* COMING SOON */
  .soon {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
  }
  .soon .icon { font-size: 36px; margin-bottom: 12px; display: block; }
</style>
</head>

let history = [], current = 'start';

function render() {
  const node = typeof current === 'object' ? current : tree[current];
  const el = document.getElementById('content');
  const step = history.length, total = 7;
  const pct = Math.round((step / total) * 100);

  if (node.type === 'result') {
    el.innerHTML =
      '<div class="result-' + node.label + '">' +
        '<div class="result-title">' + node.title + '</div>' +
        '<div class="result-body">' + node.body + '</div>' +
      '</div>' +
      '<button class="btn restart" onclick="restart()">← Nouveau diagnostic</button>';
    return;
  }

  const schemaHtml = node.schema ? '<div class="schema-wrap">' + schemas[node.schema] + '</div>' : '';
  const progressHtml = step > 0
    ? '<div class="progress"><div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div><div class="progress-label">Étape ' + step + ' / ' + total + '</div></div>'
    : '';

  let btns = '';
  if (node.type === 'symptom') {
    btns = node.options.map(function(o) {
      return '<button class="btn symptom" onclick="go(\'' + o.next + '\')">' + o.label + '</button>';
    }).join('');
  } else {
    btns = '<button class="btn oui" onclick="answer(\'oui\')">✓ Oui</button>' +
           '<button class="btn non" onclick="answer(\'non\')">✗ Non</button>';
  }

  const backHtml = history.length > 0
    ? '<button class="btn back" onclick="back()">← Étape précédente</button>'
    : '';

  el.innerHTML =
    progressHtml +
    '<div class="step-tag">' + node.tag + '</div>' +
    '<div class="question">' + node.question + '</div>' +
    (node.instruction ? '<div class="instruction">' + node.instruction + '</div>' : '') +
    schemaHtml +
    '<div class="btns">' + btns + '</div>' +
    backHtml;
}

function go(next) { history.push(current); current = next; render(); }
function answer(c) { var n = tree[current]; history.push(current); current = n[c]; render(); }
function back() { if (history.length) { current = history.pop(); render(); } }
function restart() { history = []; current = 'start'; render(); }
function selectWeapon(w) { if (w === 'sabre') { restart(); } }
